<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Входящий разговор</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="receiver-body" id="body">
    <div class="receiver-bg">
      <img id="clientPhotoBg" class="receiver-bg-photo" src="/assets/client-photo.jpg" alt="" />
      <div class="receiver-bg-overlay"></div>
    </div>

    <main class="receiver-fullscreen">
      <!-- Incoming screen -->
      <div id="incomingView" class="receiver-view">
        <div class="rv-top"></div>
        <div class="incoming-info" id="incomingInfo">
          <h1 id="clientName" class="incoming-name">...</h1>
          <p class="incoming-copy">Ответьте на звонок, чтобы поговорить</p>
        </div>
        <div class="rv-bottom">
          <div class="swipe-rail" id="acceptSwipe">
            <div class="swipe-rail-fill fill-green"></div>
            <div class="swipe-rail-label">Свайп чтобы ответить →</div>
            <div class="swipe-rail-thumb answer-color" id="acceptThumb">📞</div>
          </div>
        </div>
      </div>

      <!-- Active call screen -->
      <div id="receiverCallView" class="receiver-view" style="display:none;">
        <div class="rv-top"></div>
        <div class="rv-center">
          <div id="receiverCallStatus" class="rv-status">Подключение</div>
          <div id="receiverCallTimer" class="rv-timer">00:00</div>
          <div id="receiverBanner" class="rv-substatus">Идёт соединение.</div>
        </div>
        <div class="rv-bottom">
          <div class="swipe-rail" id="endSwipe">
            <div class="swipe-rail-fill fill-red"></div>
            <div class="swipe-rail-label">Свайп чтобы сбросить →</div>
            <div class="swipe-rail-thumb end-color" id="endThumb">✕</div>
          </div>
        </div>
      </div>

      <!-- End screen (after call) -->
      <div id="receiverEndView" class="receiver-view" style="display:none;">
        <div class="rv-top"></div>
        <div class="rv-center">
          <div class="end-icon">✓</div>
          <div class="rv-status">Разговор завершён</div>
          <div class="rv-substatus" style="margin-top:16px;">
            Вы только что воспользовались приложением <strong>Talk Bridge</strong>.<br><br>
            Хотите скачать? Перейдите по ссылке:
          </div>
          <a href="#" class="end-app-link">Скачать Talk Bridge</a>
        </div>
        <div class="rv-bottom"></div>
      </div>
    </main>

    <script type="module" src="/join.js"></script>
  </body>
</html>
